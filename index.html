<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a3a5c">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="VA AutoElektrik">
  <link rel="manifest" href="manifest.json">
  <title>VA AutoElektrik</title>
  <style>
    :root {
      --bg:#0f1117;--surface-1:#1a1d27;--surface-2:#20232f;
      --border:rgba(255,255,255,0.08);--border-strong:rgba(255,255,255,0.14);
      --border-accent:#3b82f6;
      --text-primary:#e8eaf0;--text-secondary:#9ca3af;--text-muted:#6b7280;
      --text-accent:#60a5fa;--text-success:#34d399;--text-warning:#fbbf24;
      --text-danger:#f87171;--text-pro:#a78bfa;
      --bg-accent:rgba(59,130,246,0.15);--bg-success:rgba(52,211,153,0.12);
      --bg-warning:rgba(251,191,36,0.12);--bg-danger:rgba(248,113,113,0.12);
      --bg-pro:rgba(167,139,250,0.15);
      --fill-accent:#2563eb;--on-accent:#fff;
      --radius:8px;
      --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      --mono:'SF Mono','Fira Code',monospace;
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;background:var(--bg);color:var(--text-primary);font-family:var(--font);overscroll-behavior:none;}

    /* ── AUTH SCREEN ── */
    .auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
    .auth-logo{margin-bottom:28px;text-align:center;}
    .auth-logo svg{margin-bottom:10px;}
    .auth-logo h1{font-size:22px;font-weight:600;}
    .auth-logo span{font-size:13px;color:var(--text-muted);}
    .auth-card{width:100%;max-width:360px;background:var(--surface-1);border-radius:16px;border:0.5px solid var(--border);padding:24px;}
    .auth-tabs{display:flex;margin-bottom:20px;border-radius:8px;background:var(--surface-2);padding:3px;}
    .auth-tab{flex:1;height:34px;border:none;background:transparent;color:var(--text-muted);font-size:14px;font-family:var(--font);border-radius:6px;cursor:pointer;}
    .auth-tab.active{background:var(--fill-accent);color:#fff;}
    .auth-field{margin-bottom:14px;}
    .auth-field label{font-size:12px;color:var(--text-muted);display:block;margin-bottom:5px;}
    .auth-field input{width:100%;height:44px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--surface-2);color:var(--text-primary);padding:0 12px;font-size:15px;font-family:var(--font);}
    .auth-field input:focus{outline:none;border-color:var(--border-accent);}
    .auth-btn{width:100%;height:48px;border-radius:var(--radius);border:none;background:var(--fill-accent);color:#fff;font-size:16px;font-weight:500;font-family:var(--font);cursor:pointer;margin-top:4px;}
    .auth-btn:active{opacity:0.85;}
    .auth-err{font-size:13px;color:var(--text-danger);text-align:center;margin-top:10px;display:none;}

    /* ── TOAST ── */
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--surface-1);border:0.5px solid var(--border-strong);color:var(--text-primary);padding:10px 18px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
    .toast.show{opacity:1;}
    .toast.success{border-color:var(--text-success);color:var(--text-success);}
    .toast.error{border-color:var(--text-danger);color:var(--text-danger);}

    /* ── SYNC INDICATOR ── */
    .sync-dot{width:8px;height:8px;border-radius:50%;background:var(--text-success);margin-left:auto;flex-shrink:0;}
    .sync-dot.offline{background:var(--text-danger);}
    .sync-dot.connecting{background:var(--text-warning);animation:pulse .8s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    /* ── MAIN APP ── */
    .app-wrap{position:relative;min-height:100vh;display:none;}
    .bg-logo{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.04;pointer-events:none;z-index:0;width:min(85vw,420px);height:min(85vw,420px);}
    .app{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:0 0 calc(70px + var(--safe-bottom));}

    .header{display:flex;align-items:center;gap:10px;padding:14px 14px 10px;background:var(--surface-1);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:10;}
    .header-logo{width:32px;height:32px;flex-shrink:0;}
    .header-text h1{font-size:15px;font-weight:600;}
    .header-text span{font-size:10px;color:var(--text-muted);}
    .header-user{display:flex;align-items:center;gap:6px;}
    .header-user .uname{font-size:11px;color:var(--text-muted);}
    .header-user .role-badge{font-size:9px;padding:1px 6px;border-radius:20px;background:var(--bg-pro);color:var(--text-pro);}
    .logout-btn{background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;padding:4px;}

    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px 10px 0;}
    .stat{background:var(--surface-1);border-radius:var(--radius);padding:8px 6px;text-align:center;}
    .stat-label{font-size:9px;color:var(--text-muted);margin-bottom:2px;}
    .stat-val{font-size:18px;font-weight:600;}
    .stat-val.success{color:var(--text-success);}.stat-val.accent{color:var(--text-accent);}
    .stat-val.warning{color:var(--text-warning);}.stat-val.danger{color:var(--text-danger);}
    .stats-money{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:6px 10px 0;}
    .stat-money{background:var(--surface-1);border-radius:var(--radius);padding:8px 10px;display:flex;justify-content:space-between;align-items:center;}
    .stat-money .l{font-size:10px;color:var(--text-muted);}.stat-money .v{font-size:13px;font-weight:600;color:var(--text-pro);font-family:var(--mono);}

    .search-row{display:flex;gap:7px;padding:10px 10px 0;}
    .search-wrap{position:relative;flex:1;}
    .search-wrap input{width:100%;height:38px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--surface-2);color:var(--text-primary);padding:0 10px 0 34px;font-size:13px;font-family:var(--font);}
    .search-wrap input:focus{outline:none;border-color:var(--border-accent);}
    .si{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text-muted);}

    .chips{display:flex;gap:5px;padding:6px 10px 0;overflow-x:auto;scrollbar-width:none;}
    .chips::-webkit-scrollbar{display:none;}
    .chip{flex-shrink:0;height:28px;padding:0 11px;border-radius:20px;border:0.5px solid var(--border);background:var(--surface-2);color:var(--text-secondary);font-size:11px;font-family:var(--font);cursor:pointer;}
    .chip.active{background:var(--fill-accent);border-color:var(--fill-accent);color:#fff;}

    .list{padding:8px 10px;display:flex;flex-direction:column;gap:7px;}
    .car-card{background:var(--surface-1);border-radius:11px;border:0.5px solid var(--border);overflow:hidden;}
    .car-card-top{padding:10px 12px 8px;}
    .car-row1{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
    .plate{font-family:var(--mono);font-size:14px;font-weight:600;letter-spacing:2px;background:var(--bg-accent);color:var(--text-accent);padding:2px 8px;border-radius:4px;}
    .sbadge{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:500;margin-left:auto;}
    .s-active{background:var(--bg-success);color:var(--text-success);}
    .s-inwork{background:var(--bg-accent);color:var(--text-accent);}
    .s-service{background:var(--bg-warning);color:var(--text-warning);}
    .s-inactive{background:var(--bg-danger);color:var(--text-danger);}
    .car-name{font-size:14px;font-weight:500;}
    .car-meta{font-size:11px;color:var(--text-muted);margin-top:1px;}
    .car-prices{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:6px;}
    .price-box{border-radius:5px;padding:5px 8px;background:var(--surface-2);}
    .price-label{font-size:9px;color:var(--text-muted);margin-bottom:1px;}
    .price-val{font-size:12px;font-weight:600;font-family:var(--mono);color:var(--text-pro);}
    .price-val.over{color:var(--text-danger);}
    .car-reason{margin-top:6px;padding:6px 8px;background:var(--surface-2);border-radius:5px;border-left:2px solid var(--border-accent);}
    .car-reason-lbl{font-size:9px;color:var(--text-muted);margin-bottom:1px;}
    .car-reason-val{font-size:11px;color:var(--text-secondary);line-height:1.4;}
    .car-spec{display:flex;align-items:center;gap:7px;margin-top:6px;padding:6px 8px;background:var(--surface-2);border-radius:5px;}
    .av{width:24px;height:24px;border-radius:50%;background:var(--bg-pro);color:var(--text-pro);font-size:9px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .sn{font-size:12px;color:var(--text-primary);}
    .sr{font-size:10px;color:var(--text-muted);}
    .car-dates{display:flex;align-items:center;gap:6px;margin-top:6px;padding:5px 8px;background:var(--surface-2);border-radius:5px;font-size:11px;color:var(--text-muted);}
    .car-dates .dv{color:var(--text-primary);font-weight:500;}
    .car-by{font-size:10px;color:var(--text-muted);margin-top:4px;}
    .car-actions{display:flex;border-top:0.5px solid var(--border);}
    .car-action-btn{flex:1;height:38px;border:none;background:transparent;color:var(--text-secondary);font-size:12px;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;}
    .car-action-btn:active{background:var(--surface-2);}
    .car-action-btn.del{color:var(--text-danger);}
    .car-action-btn+.car-action-btn{border-left:0.5px solid var(--border);}

    .empty{text-align:center;padding:50px 20px;color:var(--text-muted);}
    .loading{text-align:center;padding:40px;color:var(--text-muted);font-size:14px;}

    .bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(58px + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:var(--surface-1);border-top:0.5px solid var(--border);display:flex;z-index:20;}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:var(--text-muted);font-size:9px;font-family:var(--font);cursor:pointer;}
    .nav-btn.active{color:var(--text-accent);}
    .nav-btn svg{width:20px;height:20px;}
    .nav-add{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;}
    .nav-add-circle{width:44px;height:44px;border-radius:50%;background:var(--fill-accent);display:flex;align-items:center;justify-content:center;margin-top:-16px;box-shadow:0 4px 14px rgba(37,99,235,0.5);}

    /* ── SHEET ── */
    .sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:30;opacity:0;pointer-events:none;transition:opacity .25s;}
    .sheet-overlay.open{opacity:1;pointer-events:all;}
    .sheet{position:fixed;bottom:0;left:0;right:0;z-index:31;background:var(--surface-1);border-radius:18px 18px 0 0;padding:0 0 calc(16px + var(--safe-bottom));transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:93vh;overflow-y:auto;}
    .sheet.open{transform:translateY(0);}
    .sh-handle{width:32px;height:3px;background:var(--border-strong);border-radius:2px;margin:10px auto 12px;}
    .sh-title{font-size:16px;font-weight:600;padding:0 14px 12px;}
    .sh-sec{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;padding:10px 14px 5px;}
    .field{padding:0 14px 10px;}
    .field label{font-size:11px;color:var(--text-muted);display:block;margin-bottom:4px;}
    .field input,.field select,.field textarea{width:100%;height:42px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--surface-2);color:var(--text-primary);padding:0 11px;font-size:14px;font-family:var(--font);}
    .field input[type=date]{color-scheme:dark;}
    .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--border-accent);}
    .field textarea{height:70px;padding:9px 11px;resize:none;line-height:1.5;}
    .plate-input{font-family:var(--mono)!important;text-transform:uppercase;font-weight:600;letter-spacing:3px;font-size:16px!important;}
    .f2{display:grid;grid-template-columns:1fr 1fr;}
    .sh-actions{display:flex;gap:9px;padding:8px 14px 0;}
    .btn{height:46px;border-radius:var(--radius);border:0.5px solid var(--border-strong);background:transparent;color:var(--text-primary);font-size:14px;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;}
    .btn.primary{flex:1;background:var(--fill-accent);border-color:var(--fill-accent);color:#fff;font-weight:500;}
    .btn.secondary{width:78px;}
    .err{font-size:11px;color:var(--text-danger);margin-top:3px;display:none;}

    /* Specialist picker */
    .spec-pick{padding:0 14px 10px;}
    .spec-pick label{font-size:11px;color:var(--text-muted);display:block;margin-bottom:5px;}
    .spec-pick-list{display:flex;flex-direction:column;gap:5px;}
    .spi{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--surface-2);border-radius:var(--radius);border:0.5px solid var(--border);cursor:pointer;}
    .spi.sel{border-color:var(--border-accent);background:var(--bg-accent);}
    .spi .av{width:30px;height:30px;font-size:10px;}
    .spi .info .sn{font-size:13px;color:var(--text-primary);}
    .spi .info .sr{font-size:10px;color:var(--text-muted);}
    .spi .chk{margin-left:auto;color:var(--text-accent);font-size:16px;}
    .spec-empty{font-size:12px;color:var(--text-muted);padding:10px 0;text-align:center;}
  </style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ── AUTH SCREEN ── -->
<div class="auth-screen" id="auth-screen">
  <div class="auth-logo">
    <svg width="64" height="64" viewBox="0 0 60 60"><circle cx="30" cy="30" r="29" fill="#1a3a5c" stroke="#2563a8" stroke-width="1.5"/><text x="30" y="36" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="22" fill="#fff" letter-spacing="-1">VA</text></svg>
    <h1>Vahit AutoElektrik</h1>
    <span>Система учёта автомобилей</span>
  </div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Войти</button>
      <button class="auth-tab" id="tab-reg" onclick="switchTab('reg')">Регистрация</button>
    </div>
    <div id="form-login">
      <div class="auth-field"><label>Email</label><input id="l-email" type="email" placeholder="admin@vahit.local" autocomplete="email"></div>
      <div class="auth-field"><label>Пароль</label><input id="l-pass" type="password" placeholder="••••••" autocomplete="current-password"></div>
      <button class="auth-btn" onclick="login()">Войти</button>
    </div>
    <div id="form-reg" style="display:none">
      <div class="auth-field"><label>Имя</label><input id="r-name" placeholder="Ваше имя"></div>
      <div class="auth-field"><label>Email</label><input id="r-email" type="email" placeholder="email@example.com"></div>
      <div class="auth-field"><label>Пароль</label><input id="r-pass" type="password" placeholder="Минимум 6 символов"></div>
      <button class="auth-btn" onclick="register()">Зарегистрироваться</button>
    </div>
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>

<!-- ── MAIN APP ── -->
<div class="app-wrap" id="app-wrap">
  <svg class="bg-logo" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
    <circle cx="150" cy="150" r="148" fill="none" stroke="white" stroke-width="6"/>
    <circle cx="150" cy="150" r="134" fill="none" stroke="white" stroke-width="1.5"/>
    <text x="150" y="145" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="96" fill="white" letter-spacing="-4">VA</text>
    <text x="150" y="188" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="18" fill="white" letter-spacing="3">VAHIT</text>
    <text x="150" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-weight="400" font-size="13" fill="white" letter-spacing="5">AUTOELEKTRIK</text>
  </svg>

  <div class="app">
    <div class="header">
      <svg class="header-logo" viewBox="0 0 60 60"><circle cx="30" cy="30" r="29" fill="#1a3a5c" stroke="#2563a8" stroke-width="1.5"/><text x="30" y="36" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="22" fill="#fff" letter-spacing="-1">VA</text></svg>
      <div class="header-text"><h1>Vahit AutoElektrik</h1><span id="hdr-sub">Учёт автомобилей</span></div>
      <div class="header-user">
        <span class="uname" id="hdr-user"></span>
        <span class="role-badge" id="hdr-role"></span>
        <div class="sync-dot connecting" id="sync-dot" title="Соединение..."></div>
        <button class="logout-btn" onclick="logout()" title="Выйти">⏻</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-label">На ходу</div><div class="stat-val success" id="s-active">0</div></div>
      <div class="stat"><div class="stat-label">В работе</div><div class="stat-val accent" id="s-inwork">0</div></div>
      <div class="stat"><div class="stat-label">Обслуж.</div><div class="stat-val warning" id="s-service">0</div></div>
      <div class="stat"><div class="stat-label">Не актив</div><div class="stat-val danger" id="s-inactive">0</div></div>
    </div>
    <div class="stats-money">
      <div class="stat-money"><span class="l">Предв. итого</span><span class="v" id="s-est">—</span></div>
      <div class="stat-money"><span class="l">Факт. итого</span><span class="v" id="s-act">—</span></div>
    </div>

    <div class="search-row">
      <div class="search-wrap"><span class="si">🔍</span><input id="search" placeholder="Поиск..." oninput="debounceSearch()"></div>
    </div>
    <div class="chips">
      <button class="chip active" data-status="" onclick="setFilter(this)">Все</button>
      <button class="chip" data-status="active" onclick="setFilter(this)">На ходу</button>
      <button class="chip" data-status="inwork" onclick="setFilter(this)">В работе</button>
      <button class="chip" data-status="service" onclick="setFilter(this)">На обслуживании</button>
      <button class="chip" data-status="inactive" onclick="setFilter(this)">Не активен</button>
    </div>

    <div class="list" id="list"><div class="loading">Загрузка...</div></div>
    <div id="empty" class="empty" style="display:none">🚗<br>Нет записей</div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Список
    </button>
    <button class="nav-add" onclick="openCarSheet()">
      <div class="nav-add-circle">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
    </button>
    <button class="nav-btn" onclick="openSpecSheet()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="16" y1="11" x2="22" y2="11"/></svg>
      Персонал
    </button>
  </nav>
</div>

<!-- Overlay -->
<div class="sheet-overlay" id="overlay" onclick="closeAll()"></div>

<!-- Car Sheet -->
<div class="sheet" id="car-sheet">
  <div class="sh-handle"></div>
  <div class="sh-title" id="sh-title">Добавить автомобиль</div>
  <div class="sh-sec">Автомобиль</div>
  <div class="field"><label>Гос. номер *</label><input id="f-plate" class="plate-input" placeholder="А001АА777" maxlength="12"><div class="err" id="e-plate"></div></div>
  <div class="f2"><div class="field"><label>Марка *</label><input id="f-brand" placeholder="Toyota"><div class="err" id="e-brand"></div></div><div class="field"><label>Модель</label><input id="f-model" placeholder="Camry"></div></div>
  <div class="f2"><div class="field"><label>Год</label><input id="f-year" type="number" placeholder="2020"></div><div class="field"><label>Цвет</label><input id="f-color" placeholder="Белый"></div></div>
  <div class="field"><label>Владелец</label><input id="f-owner" placeholder="Иванов И.И."></div>
  <div class="field"><label>Статус</label><select id="f-status"><option value="active">На ходу</option><option value="inwork">В работе</option><option value="service">На обслуживании</option><option value="inactive">Не активен</option></select></div>
  <div class="sh-sec">Обращение</div>
  <div class="field"><label>Причина обращения</label><textarea id="f-reason" placeholder="Неисправность, ТО, замена деталей..."></textarea></div>
  <div class="spec-pick"><label>Специалист</label><div class="spec-pick-list" id="spec-pick-list"></div><div class="spec-empty" id="spec-pick-empty" style="display:none">Нет специалистов</div></div>
  <div class="sh-sec">Даты</div>
  <div class="f2"><div class="field"><label>📅 Дата приёма</label><input id="f-date-in" type="date"></div><div class="field"><label>📅 Дата выдачи</label><input id="f-date-out" type="date"></div></div>
  <div class="sh-sec">Стоимость</div>
  <div class="f2"><div class="field"><label>Предварительная (₸)</label><input id="f-est" type="number" placeholder="0" min="0"></div><div class="field"><label>Фактическая (₸)</label><input id="f-act" type="number" placeholder="0" min="0"></div></div>
  <div class="field"><label>Примечание</label><input id="f-note" placeholder="Заметка..."></div>
  <div class="sh-actions"><button class="btn secondary" onclick="closeAll()">Отмена</button><button class="btn primary" id="car-submit" onclick="submitCar()">Добавить</button></div>
</div>

<!-- Specialist Sheet -->
<div class="sheet" id="spec-sheet">
  <div class="sh-handle"></div>
  <div class="sh-title">👥 Персонал</div>
  <div class="sh-sec">Добавить</div>
  <div class="f2" style="padding:0 14px 8px;"><div class="field" style="padding:0;"><label>ФИО</label><input id="ns-name" placeholder="Петров А.В."></div><div class="field" style="padding:0;"><label>Должность</label><input id="ns-role" placeholder="Механик"></div></div>
  <div style="padding:0 14px 14px;"><button class="btn primary" onclick="addSpecialist()" style="width:100%;">➕ Добавить</button></div>
  <div class="sh-sec">Список сотрудников</div>
  <div style="padding:0 14px 8px;" id="spec-mgr-list"></div>
  <div class="sh-actions"><button class="btn primary" onclick="closeAll()">Готово</button></div>
</div>

<script>
// ──────────────────────────────────────────
//  КОНФИГУРАЦИЯ — поменяй адрес сервера!
// ──────────────────────────────────────────
const API   = 'https://vahit-server.onrender.com/api';  // ← адрес твоего сервера
const WS_URL = 'wss://vahit-server.onrender.com';       // ← WebSocket сервера

const SL = { active:'На ходу', inwork:'В работе', service:'На обслуживании', inactive:'Не активен' };
const SC = { active:'s-active', inwork:'s-inwork', service:'s-service', inactive:'s-inactive' };

let token = localStorage.getItem('va_token') || '';
let me = JSON.parse(localStorage.getItem('va_me') || 'null');
let cars = [], specialists = [];
let editId = null, selSpecId = null, filterStatus = '', searchTimer = null;
let ws = null;

// ── UTILS ──
function ini(n){ if(!n) return '?'; return n.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function fmtMoney(v){ return v ? Number(v).toLocaleString('ru-RU')+' ₸' : '—'; }
function fmtDate(d){ if(!d) return '—'; const [y,m,day]=d.split('T')[0].split('-'); return `${day}.${m}.${y}`; }
function gv(id){ return document.getElementById(id).value.trim(); }
function sv(id,v){ document.getElementById(id).value=v||''; }

function showToast(msg, type='', ms=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show ${type}`;
  setTimeout(()=>t.className='toast', ms);
}

// ── AUTH ──
function switchTab(t) {
  document.getElementById('tab-login').classList.toggle('active', t==='login');
  document.getElementById('tab-reg').classList.toggle('active', t==='reg');
  document.getElementById('form-login').style.display = t==='login'?'':'none';
  document.getElementById('form-reg').style.display = t==='reg'?'':'none';
  document.getElementById('auth-err').style.display = 'none';
}

async function authReq(url, body) {
  const r = await fetch(API+url, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  return r.json();
}

async function login() {
  const data = await authReq('/auth/login', {email:gv('l-email'), password:gv('l-pass')});
  if (data.error) { const el=document.getElementById('auth-err'); el.textContent=data.error; el.style.display='block'; return; }
  onLogin(data);
}

async function register() {
  const data = await authReq('/auth/register', {name:gv('r-name'), email:gv('r-email'), password:gv('r-pass')});
  if (data.error) { const el=document.getElementById('auth-err'); el.textContent=data.error; el.style.display='block'; return; }
  onLogin(data);
}

function onLogin(data) {
  token = data.token; me = data.user;
  localStorage.setItem('va_token', token);
  localStorage.setItem('va_me', JSON.stringify(me));
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-wrap').style.display = 'block';
  document.getElementById('hdr-user').textContent = me.name;
  document.getElementById('hdr-role').textContent = {admin:'Админ',manager:'Менеджер',worker:'Сотрудник'}[me.role]||me.role;
  connectWS();
  loadAll();
}

function logout() {
  token=''; me=null;
  localStorage.removeItem('va_token'); localStorage.removeItem('va_me');
  if (ws) ws.close();
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('app-wrap').style.display='none';
}

// ── API ──
async function api(method, path, body) {
  const opts = {method, headers:{Authorization:`Bearer ${token}`}};
  if (body) { opts.headers['Content-Type']='application/json'; opts.body=JSON.stringify(body); }
  const r = await fetch(API+path, opts);
  if (r.status===401) { logout(); return {}; }
  return r.json();
}

// ── WEBSOCKET real-time sync ──
function connectWS() {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot connecting';

  ws = new WebSocket(WS_URL + '?token=' + token);

  ws.onopen = () => { dot.className='sync-dot'; dot.title='Онлайн'; };
  ws.onclose = () => {
    dot.className='sync-dot offline'; dot.title='Офлайн';
    setTimeout(connectWS, 3000); // переподключение
  };
  ws.onerror = () => { dot.className='sync-dot offline'; };

  ws.onmessage = (e) => {
    const {event, data} = JSON.parse(e.data);
    switch(event) {
      case 'car:created':
        if (!cars.find(c=>c.id===data.id)) { cars.unshift(data); renderCars(); showToast('Новый автомобиль добавлен'); }
        break;
      case 'car:updated':
        cars = cars.map(c=>c.id===data.id?data:c); renderCars();
        break;
      case 'car:deleted':
        cars = cars.filter(c=>c.id!==data.id); renderCars(); showToast('Запись удалена');
        break;
      case 'specialist:created':
        if (!specialists.find(s=>s.id===data.id)) specialists.push(data);
        renderSpecPicker(); renderSpecMgr();
        break;
      case 'specialist:updated':
        specialists = specialists.map(s=>s.id===data.id?data:s);
        renderSpecPicker(); renderSpecMgr();
        break;
      case 'specialist:deleted':
        specialists = specialists.filter(s=>s.id!==data.id);
        renderSpecPicker(); renderSpecMgr();
        break;
    }
  };
}

// ── LOAD ──
async function loadAll() {
  const [c, s] = await Promise.all([api('GET','/cars'), api('GET','/specialists')]);
  cars = Array.isArray(c) ? c : [];
  specialists = Array.isArray(s) ? s : [];
  renderCars();
}

// ── SEARCH ──
function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(async () => {
    const q = gv('search');
    const data = await api('GET', `/cars?q=${encodeURIComponent(q)}&status=${filterStatus}`);
    if (Array.isArray(data)) { cars=data; renderCars(); }
  }, 400);
}

function setFilter(el) {
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  filterStatus = el.dataset.status;
  debounceSearch();
}

// ── RENDER CARS ──
function renderCars() {
  const q = gv('search').toLowerCase();
  const list = cars.filter(c => {
    const m = !q || [c.plate,c.brand,c.model,c.owner,c.reason,c.specialist_name].some(v=>(v||'').toLowerCase().includes(q));
    return m && (!filterStatus||c.status===filterStatus);
  });

  document.getElementById('s-active').textContent  = cars.filter(c=>c.status==='active').length;
  document.getElementById('s-inwork').textContent  = cars.filter(c=>c.status==='inwork').length;
  document.getElementById('s-service').textContent = cars.filter(c=>c.status==='service').length;
  document.getElementById('s-inactive').textContent= cars.filter(c=>c.status==='inactive').length;
  const te=cars.reduce((s,c)=>s+(parseFloat(c.price_est)||0),0);
  const ta=cars.reduce((s,c)=>s+(parseFloat(c.price_act)||0),0);
  document.getElementById('s-est').textContent=te?te.toLocaleString('ru-RU')+' ₸':'—';
  document.getElementById('s-act').textContent=ta?ta.toLocaleString('ru-RU')+' ₸':'—';

  const el=document.getElementById('list');
  const empty=document.getElementById('empty');
  if (!list.length) { el.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';

  el.innerHTML=list.map(c=>{
    const est=parseFloat(c.price_est)||0, act=parseFloat(c.price_act)||0;
    const over=act>0&&est>0&&act>est;
    const canEdit = me?.role!=='worker' || c.created_by===me?.id;
    return `
    <div class="car-card">
      <div class="car-card-top">
        <div class="car-row1"><span class="plate">${c.plate}</span><span class="sbadge ${SC[c.status]}">${SL[c.status]}</span></div>
        <div class="car-name">${c.brand}${c.model?' '+c.model:''}</div>
        <div class="car-meta">${[c.year,c.color,c.owner].filter(Boolean).join(' · ')}</div>
        ${(c.price_est||c.price_act)?`<div class="car-prices">
          <div class="price-box"><div class="price-label">Предварительная</div><div class="price-val">${fmtMoney(c.price_est)}</div></div>
          <div class="price-box"><div class="price-label">Фактическая</div><div class="price-val ${over?'over':''}">${fmtMoney(c.price_act)}${over?' ↑':''}</div></div>
        </div>`:''}
        ${c.reason?`<div class="car-reason"><div class="car-reason-lbl">Причина</div><div class="car-reason-val">${c.reason}</div></div>`:''}
        ${c.specialist_name?`<div class="car-spec"><div class="av">${ini(c.specialist_name)}</div><div><div class="sn">${c.specialist_name}</div>${c.specialist_role?`<div class="sr">${c.specialist_role}</div>`:''}</div></div>`:''}
        ${(c.date_in||c.date_out)?`<div class="car-dates"><span>📅 Приём:</span><span class="dv">${fmtDate(c.date_in)}</span><span>→ Выдача:</span><span class="dv">${fmtDate(c.date_out)}</span></div>`:''}
        ${c.created_by_name?`<div class="car-by">Добавил: ${c.created_by_name}</div>`:''}
        ${c.note?`<div style="margin-top:5px;font-size:10px;color:var(--text-muted)">📝 ${c.note}</div>`:''}
      </div>
      ${canEdit?`<div class="car-actions">
        <button class="car-action-btn" onclick="openCarSheet(${c.id})">✏️ Редактировать</button>
        <button class="car-action-btn del" onclick="deleteCar(${c.id})">🗑 Удалить</button>
      </div>`:''}
    </div>`;
  }).join('');
}

// ── CAR SHEET ──
function openCarSheet(id=null) {
  editId=id; selSpecId=null;
  if (id) {
    const c=cars.find(x=>x.id===id); if(!c) return;
    sv('f-plate',c.plate); sv('f-brand',c.brand); sv('f-model',c.model);
    sv('f-year',c.year); sv('f-color',c.color); sv('f-owner',c.owner);
    document.getElementById('f-status').value=c.status;
    sv('f-reason',c.reason); selSpecId=c.specialist_id||null;
    sv('f-date-in',(c.date_in||'').split('T')[0]);
    sv('f-date-out',(c.date_out||'').split('T')[0]);
    sv('f-est',c.price_est); sv('f-act',c.price_act); sv('f-note',c.note);
    document.getElementById('sh-title').textContent='Редактировать';
    document.getElementById('car-submit').textContent='Сохранить';
  } else {
    ['f-plate','f-brand','f-model','f-year','f-color','f-owner','f-reason','f-est','f-act','f-note','f-date-out'].forEach(k=>sv(k,''));
    document.getElementById('f-status').value='active';
    document.getElementById('f-date-in').value=new Date().toISOString().split('T')[0];
    document.getElementById('sh-title').textContent='Добавить автомобиль';
    document.getElementById('car-submit').textContent='Добавить';
  }
  ['e-plate','e-brand'].forEach(id=>{document.getElementById(id).style.display='none';});
  renderSpecPicker();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('car-sheet').classList.add('open');
  setTimeout(()=>document.getElementById('f-plate').focus(),300);
}

function renderSpecPicker() {
  const list=document.getElementById('spec-pick-list');
  const empty=document.getElementById('spec-pick-empty');
  if (!specialists.length) { list.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  list.innerHTML=specialists.map(s=>`
    <div class="spi ${selSpecId===s.id?'sel':''}" onclick="pickSpec(${s.id})">
      <div class="av">${ini(s.name)}</div>
      <div class="info"><div class="sn">${s.name}</div>${s.role?`<div class="sr">${s.role}</div>`:''}</div>
      ${selSpecId===s.id?'<span class="chk">✓</span>':''}
    </div>`).join('');
}

function pickSpec(id) { selSpecId=(selSpecId===id)?null:id; renderSpecPicker(); }

async function submitCar() {
  const plate=gv('f-plate'), brand=gv('f-brand');
  let ok=true;
  const ep=document.getElementById('e-plate'), eb=document.getElementById('e-brand');
  if (!plate) { ep.textContent='Введите номер'; ep.style.display='block'; ok=false; } else ep.style.display='none';
  if (!brand) { eb.textContent='Введите марку'; eb.style.display='block'; ok=false; } else eb.style.display='none';
  if (!ok) return;

  const body={
    plate,brand,
    model:gv('f-model')||null, year:gv('f-year')||null, color:gv('f-color')||null,
    owner:gv('f-owner')||null, status:document.getElementById('f-status').value,
    reason:gv('f-reason')||null, specialist_id:selSpecId||null,
    date_in:gv('f-date-in')||null, date_out:gv('f-date-out')||null,
    price_est:gv('f-est')||null, price_act:gv('f-act')||null, note:gv('f-note')||null
  };

  const data = editId
    ? await api('PUT', `/cars/${editId}`, body)
    : await api('POST', '/cars', body);

  if (data.error) { showToast(data.error,'error'); return; }
  if (!editId) { cars.unshift(data); showToast('Автомобиль добавлен','success'); }
  else { cars=cars.map(c=>c.id===data.id?data:c); showToast('Сохранено','success'); }
  closeAll(); renderCars();
}

async function deleteCar(id) {
  if (!confirm('Удалить запись?')) return;
  const data=await api('DELETE',`/cars/${id}`);
  if (data.error) { showToast(data.error,'error'); return; }
  cars=cars.filter(c=>c.id!==id); renderCars(); showToast('Удалено');
}

// ── SPECIALIST SHEET ──
function openSpecSheet() {
  renderSpecMgr();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('spec-sheet').classList.add('open');
}

function renderSpecMgr() {
  const el=document.getElementById('spec-mgr-list');
  if (!specialists.length) { el.innerHTML='<div class="spec-empty">Нет специалистов</div>'; return; }
  el.innerHTML=specialists.map(s=>`
    <div class="spi" style="margin-bottom:6px;cursor:default;">
      <div class="av">${ini(s.name)}</div>
      <div class="info"><div class="sn">${s.name}</div>${s.role?`<div class="sr">${s.role}</div>`:''}</div>
      <button style="background:none;border:none;color:var(--text-danger);font-size:16px;cursor:pointer;" onclick="deleteSpecialist(${s.id})">✕</button>
    </div>`).join('');
}

async function addSpecialist() {
  const name=gv('ns-name'); if(!name) return;
  const data=await api('POST','/specialists',{name,role:gv('ns-role')||null});
  if (data.error) { showToast(data.error,'error'); return; }
  specialists.push(data); sv('ns-name',''); sv('ns-role','');
  renderSpecMgr(); renderSpecPicker(); showToast('Специалист добавлен','success');
}

async function deleteSpecialist(id) {
  if(!confirm('Удалить специалиста?')) return;
  const data=await api('DELETE',`/specialists/${id}`);
  if(data.error) { showToast(data.error,'error'); return; }
  specialists=specialists.filter(s=>s.id!==id);
  renderSpecMgr(); renderSpecPicker();
}

function closeAll() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('car-sheet').classList.remove('open');
  document.getElementById('spec-sheet').classList.remove('open');
}

// ── INIT ──
if (token && me) {
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app-wrap').style.display='block';
  document.getElementById('hdr-user').textContent=me.name;
  document.getElementById('hdr-role').textContent={admin:'Админ',manager:'Менеджер',worker:'Сотрудник'}[me.role]||me.role;
  connectWS(); loadAll();
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
